{% extends "layouts/base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center p-3">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0" style="border-radius: 16px; background-color: rgba(255, 255, 255, 0.95);">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-lock fa-3x" style="color: var(--primary-color);"></i>
                    <h2 class="fw-bold mt-3" style="font-family: 'Georgia', serif; color: var(--text-main);">Forgot
                        Password</h2>
                    <p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>
                </div>

                <form method="POST" action="{{ url_for('main.forgot_password') }}">
                    <div class="form-group mb-4 text-start">
                        <label for="email" class="fw-bold text-muted small mb-2">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control form-control-lg rounded-3"
                            style="border-color: rgba(139, 69, 19, 0.2);" required placeholder="you@gmail.com">
                    </div>

                    <button type="submit" class="btn w-100 rounded-pill py-3 fw-bold text-white shadow-sm"
                        style="background-color: var(--primary-color); font-size: 1.1rem; transition: transform 0.2s;">Send
                        Reset Link</button>
                </form>

                <p class="text-center mt-4 mb-0 text-muted small">
                    Remember your password? <a href="{{ url_for('main.login') }}" class="fw-bold text-decoration-none"
                        style="color: var(--primary-hover);">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
