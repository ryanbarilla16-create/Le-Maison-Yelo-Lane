{% extends "layouts/base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<div class="row w-100 justify-content-center m-0 p-3">
    <div class="col-12 col-md-8 col-lg-5 col-xxl-4 p-0">
        <div class="card shadow-lg border-0"
            style="border-radius: 24px; background-color: rgba(255, 255, 255, 0.95); overflow: hidden;">
            <div class="card-header text-center border-0"
                style="background: linear-gradient(to right, rgba(139, 69, 19, 0.05), rgba(210, 105, 30, 0.05)); padding: 3rem 2rem 1.5rem;">
                <h2 class="fw-bold mb-2"
                    style="font-family: 'Georgia', serif; color: var(--primary-color); font-size: 2.25rem;">Welcome Back
                </h2>
                <p class="text-muted" style="font-size: 1.05rem;">Please sign in to your account.</p>
            </div>

            <div class="card-body p-4 p-md-5 pt-2">

                <div class="row g-3 mb-4 mt-2">
                    <div class="col-6">
                        <button type="button" onclick="handleGoogleLogin()"
                            class="btn btn-outline-dark w-100 rounded-pill py-2 d-flex align-items-center justify-content-center gap-2 shadow-sm"
                            style="border: 1px solid #e2e8f0; transition: all 0.2s;">
                            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"
                                style="width: 20px;">
                            <span class="fw-bold text-muted" style="font-size: 0.95rem;">Google</span>
                        </button>
                    </div>
                    <div class="col-6">
                        <button type="button" onclick="handleFacebookLogin()"
                            class="btn btn-outline-dark w-100 rounded-pill py-2 d-flex align-items-center justify-content-center gap-2 shadow-sm"
                            style="border: 1px solid #e2e8f0; transition: all 0.2s;">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"
                                alt="Facebook" style="width: 20px;">
                            <span class="fw-bold text-muted" style="font-size: 0.95rem;">Facebook</span>
                        </button>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-4">
                    <hr class="flex-grow-1" style="border-top: 1px solid #e0e0e0;">
                    <span class="mx-3 text-muted small fw-bold" style="font-size: 0.75rem; letter-spacing: 1px;">OR LOG
                        IN WITH EMAIL</span>
                    <hr class="flex-grow-1" style="border-top: 1px solid #e0e0e0;">
                </div>

                <form method="POST" action="{{ url_for('main.login') }}">
                    <div class="form-group mb-4">
                        <label for="email" class="fw-bold text-muted small text-uppercase letter-spacing-1 mb-2">Email
                            Address</label>
                        <input type="email" id="email" name="email" class="form-control form-control-lg bg-light"
                            style="border: 1px solid rgba(139, 69, 19, 0.15); border-radius: 12px; padding: 0.85rem 1rem;"
                            required placeholder="you@gmail.com">
                    </div>

                    <div class="form-group mb-4 position-relative">
                        <div class="d-flex justify-content-between align-items-center">
                            <label for="password"
                                class="fw-bold text-muted small text-uppercase letter-spacing-1 mb-2">Password</label>
                            <a href="{{ url_for('main.forgot_password') }}"
                                class="small fw-semibold text-decoration-none"
                                style="color: var(--primary-color);">Forgot Password?</a>
                        </div>
                        <div class="position-relative">
                            <input type="password" id="password" name="password"
                                class="form-control form-control-lg bg-light"
                                style="border: 1px solid rgba(139, 69, 19, 0.15); border-radius: 12px; padding: 0.85rem 2.5rem 0.85rem 1rem;"
                                required placeholder="••••••••">
                            <i class="fas fa-eye" onclick="togglePasswordVisibility('password', this)"
                                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #a0a0a0; font-size: 1.1rem; z-index: 10;"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 rounded-pill py-3 fw-bold text-white shadow-sm mt-3"
                        style="background-color: var(--primary-color); font-size: 1.1rem; transition: transform 0.2s;">Sign
                        In to Le Maison</button>
                </form>

                <div class="text-center mt-5">
                    <p class="text-muted small">
                        Don't have an account? <a href="{{ url_for('main.signup') }}"
                            class="fw-bold text-decoration-none pb-1"
                            style="color: var(--primary-hover); border-bottom: 2px solid var(--primary-hover);">Create
                            one here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    // --- Social Login Integration ---
    function sendSocialAuth(provider, email, firstName, lastName, pictureUrl) {
        fetch('/social_auth', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                provider: provider,
                email: email,
                first_name: firstName,
                last_name: lastName,
                picture_url: pictureUrl
            })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else if (data.needs_registration) {
                    // If they tried to log in but don't exist, redirect to signup
                    alert(data.message + "\n\nRedirecting to sign up page...");

                    // Construct a URL to prefill signup
                    sessionStorage.setItem('social_signup_pending', JSON.stringify(data.data));
                    window.location.href = "{{ url_for('main.signup') }}";
                } else {
                    alert(data.message || "An error occurred during social login.");
                }
            });
    }

    // --- Facebook Setup ---
    window.fbAsyncInit = function () {
        FB.init({
            appId: '{{ FACEBOOK_APP_ID }}',
            cookie: true,
            xfbml: true,
            version: 'v18.0'
        });
    };
    function handleFacebookLogin() {
        if ('{{ FACEBOOK_APP_ID }}'.includes('HERE') || '{{ FACEBOOK_APP_ID }}' === 'None') {
            alert("⚠️ Developer Setup Required:\nPlease set FACEBOOK_APP_ID in your .env file to enable actual Facebook authentication.");
            return;
        }
        FB.login(function (response) {
            if (response.authResponse) {
                FB.api('/me', { fields: 'name,email,first_name,last_name,picture.type(large)' }, function (userResponse) {
                    const pictureUrl = userResponse.picture && userResponse.picture.data ? userResponse.picture.data.url : null;
                    sendSocialAuth('facebook', userResponse.email, userResponse.first_name, userResponse.last_name, pictureUrl);
                });
            } else {
                console.log('User cancelled login or did not fully authorize.');
            }
        }, { scope: 'public_profile,email' });
    }

    // --- Google Setup ---
    let googleClient;
    function handleGoogleLogin() {
        if ('{{ GOOGLE_CLIENT_ID }}'.includes('HERE') || '{{ GOOGLE_CLIENT_ID }}' === 'None') {
            alert("⚠️ Developer Setup Required:\nPlease set GOOGLE_CLIENT_ID in your .env file to enable actual Google authentication.");
            return;
        }

        if (!googleClient) {
            googleClient = google.accounts.oauth2.initTokenClient({
                client_id: '{{ GOOGLE_CLIENT_ID }}',
                scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                            headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
                        })
                            .then(res => res.json())
                            .then(userInfo => {
                                sendSocialAuth('google', userInfo.email, userInfo.given_name, userInfo.family_name, userInfo.picture);
                            })
                            .catch(err => console.error('Error fetching Google user info:', err));
                    }
                }
            });
        }
        googleClient.requestAccessToken();
    }
</script>
<script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
{% endblock %}
