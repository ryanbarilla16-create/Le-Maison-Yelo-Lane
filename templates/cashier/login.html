<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cashier Login | Le Maison</title>
    <!-- Preload critical fonts for ultra-fast render speeds -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"></noscript>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2e7d32; /* Rich Green */
            --primary-light: #4caf50;
            --dark: #1b5e20;
            --bg-color: #f1f8e9;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Instant Load CSS Gradient - Zero Image Weight */
            background: radial-gradient(circle at top right, rgba(76, 175, 80, 0.4), transparent 50%),
                        radial-gradient(circle at bottom left, rgba(200, 230, 201, 0.9), transparent 50%),
                        var(--bg-color);
            background-size: cover;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 30px 60px -12px rgba(46, 125, 50, 0.15);
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Top Accent Line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--primary);
            font-size: 2.2rem;
        }

        .login-title {
            color: var(--dark);
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            color: #689f38;
            font-size: 0.95rem;
            font-weight: 500;
            margin: 0 0 2.5rem 0;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 0.5rem;
        }

        .form-control {
            width: 100%;
            background: #ffffff;
            border: 2px solid rgba(76, 175, 80, 0.15);
            border-radius: 16px;
            padding: 1.1rem 1.25rem;
            font-size: 1rem;
            color: var(--dark);
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
        }

        .form-control::placeholder {
            color: #aed581;
        }

        .pwd-control { padding-right: 3rem; }

        .toggle-pwd {
            position: absolute;
            right: 1.2rem;
            top: 40px;
            cursor: pointer;
            color: #8bc34a;
            transition: color 0.2s;
        }

        .toggle-pwd:hover { color: var(--primary); }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 1.25rem;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px -6px rgba(46, 125, 50, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -6px rgba(46, 125, 50, 0.5);
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #689f38;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--dark); }

        .flash-msg {
            background: #ffebee;
            color: #c62828;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-container">
            <i class="fas fa-cash-register"></i>
        </div>
        <h2 class="login-title">Cashier Portal</h2>
        <p class="login-subtitle">Process live customer transactions</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-msg">
            <i class="fas fa-exclamation-triangle" style="margin-right: 6px;"></i> {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('cashier_portal.cashier_login') }}">
            <div class="input-wrapper">
                <label class="input-label">Terminal Email</label>
                <input type="email" name="email" required placeholder="cashier_desk@le-maison.com" class="form-control">
            </div>
            
            <div class="input-wrapper">
                <label class="input-label">Passcode</label>
                <input type="password" id="user-pwd" name="password" required placeholder="••••••••" class="form-control pwd-control">
                <i class="fas fa-eye toggle-pwd" onclick="togglePass()"></i>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-unlock-keyhole"></i> Initialize Terminal
            </button>
        </form>

        <a href="{{ url_for('main.index') }}" class="back-link">
            <i class="fas fa-angle-left"></i> Return to Main Site
        </a>
    </div>

    <script>
        function togglePass() {
            const pwd = document.getElementById('user-pwd');
            const icon = event.currentTarget;
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
