<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rider Login | Le Maison</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"></noscript>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #f57c00; /* Sunset Orange */
            --primary-light: #ff9800;
            --dark: #3e2723; /* Dark Brown */
            --bg-color: #fff3e0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Dynamic Speed/Sunset Gradient */
            background: linear-gradient(135deg, #ffb74d 0%, #f57c00 100%);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Abstract motion lines for rider theme */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 100vw;
            height: 10px;
            background: rgba(255,255,255,0.2);
            z-index: -1;
            transform: skewY(-20deg);
        }
        body::before { top: 20%; left: -10%; width: 120%; }
        body::after { bottom: 30%; right: -10%; width: 150%; height: 2px; }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(62, 39, 35, 0.3);
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: var(--dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--primary);
            font-size: 2.2rem;
            box-shadow: 0 10px 20px rgba(62, 39, 35, 0.2);
            position: relative;
        }

        .icon-container::after {
            content: '';
            position: absolute;
            top: -5px; right: -5px; bottom: -5px; left: -5px;
            border: 2px dashed rgba(245, 124, 0, 0.5);
            border-radius: 50%;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .login-title {
            color: var(--dark);
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.2rem 0;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            color: #d84315;
            font-size: 0.95rem;
            font-weight: 500;
            margin: 0 0 2.5rem 0;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 0.2rem;
        }

        .form-control {
            width: 100%;
            background: #fff8e1;
            border: 2px solid #ffe082;
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            font-size: 1rem;
            color: var(--dark);
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(245, 124, 0, 0.15);
        }

        .form-control::placeholder {
            color: #ffca28;
        }

        .pwd-control { padding-right: 3rem; }

        .toggle-pwd {
            position: absolute;
            right: 1.2rem;
            top: 40px;
            cursor: pointer;
            color: #ffb300;
            transition: color 0.2s;
        }

        .toggle-pwd:hover { color: var(--primary); }

        .btn-submit {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1.2rem;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: #2b1814;
            transform: scale(1.02);
            box-shadow: 0 8px 15px rgba(62, 39, 35, 0.4);
        }

        .btn-submit i { color: var(--primary); }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #a1887f;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--dark); }

        .flash-msg {
            background: #fff3e0;
            color: #d84315;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #ffe0b2;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-container">
            <i class="fas fa-motorcycle"></i>
        </div>
        <h2 class="login-title">Rider Fleet</h2>
        <p class="login-subtitle">Connect and track your routes</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-msg">
            <i class="fas fa-exclamation-triangle" style="margin-right: 6px;"></i> {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('rider_portal.rider_login') }}">
            <div class="input-wrapper">
                <label class="input-label">Rider Email</label>
                <input type="email" name="email" required placeholder="rider_one@le-maison.com" class="form-control">
            </div>
            
            <div class="input-wrapper">
                <label class="input-label">Passcode</label>
                <input type="password" id="user-pwd" name="password" required placeholder="••••••••" class="form-control pwd-control">
                <i class="fas fa-eye toggle-pwd" onclick="togglePass()"></i>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-location-arrow"></i> Start Shift
            </button>
        </form>

        <a href="{{ url_for('main.index') }}" class="back-link">
            <i class="fas fa-angle-left"></i> Return to Main Site
        </a>
    </div>

    <script>
        function togglePass() {
            const pwd = document.getElementById('user-pwd');
            const icon = event.currentTarget;
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
