<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitchen Login | Le Maison</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"></noscript>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d32f2f; /* Fire Red */
            --primary-light: #ef5350;
            --dark: #212121; /* Slate */
            --bg-color: #fafafa;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Instant Load CSS Gradient */
            background: radial-gradient(circle at bottom right, rgba(211, 47, 47, 0.15), transparent 60%),
                        linear-gradient(135deg, #1c1c1c 0%, #303030 100%);
            color: white;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(33, 33, 33, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
        }

        .icon-container {
            width: 75px;
            height: 75px;
            background: rgba(211, 47, 47, 0.15);
            border: 2px solid rgba(211, 47, 47, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--primary-light);
            font-size: 2rem;
            transform: rotate(45deg);
        }

        .icon-container i {
            transform: rotate(-45deg);
        }

        .login-title {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            color: #bdbdbd;
            font-size: 0.95rem;
            font-weight: 500;
            margin: 0 0 2.5rem 0;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #9e9e9e;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            font-size: 1rem;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.15);
        }

        .form-control::placeholder {
            color: #757575;
        }

        .pwd-control { padding-right: 3rem; }

        .toggle-pwd {
            position: absolute;
            right: 1.2rem;
            top: 40px;
            cursor: pointer;
            color: #757575;
            transition: color 0.2s;
        }

        .toggle-pwd:hover { color: #ffffff; }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #b71c1c 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1.25rem;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(211, 47, 47, 0.6);
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #9e9e9e;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover { color: #ffffff; }

        .flash-msg {
            background: rgba(229, 115, 115, 0.1);
            color: #ef5350;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 83, 80, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-container">
            <i class="fas fa-fire-burner"></i>
        </div>
        <h2 class="login-title">Culinary Station</h2>
        <p class="login-subtitle">Sync with live order streams</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-msg">
            <i class="fas fa-exclamation-triangle" style="margin-right: 6px;"></i> {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('kitchen_portal.kitchen_login') }}">
            <div class="input-wrapper">
                <label class="input-label">Chef ID (Email)</label>
                <input type="email" name="email" required placeholder="head_chef@le-maison.com" class="form-control">
            </div>
            
            <div class="input-wrapper">
                <label class="input-label">Security Key</label>
                <input type="password" id="user-pwd" name="password" required placeholder="••••••••" class="form-control pwd-control">
                <i class="fas fa-eye toggle-pwd" onclick="togglePass()"></i>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-utensils"></i> Enter Kitchen
            </button>
        </form>

        <a href="{{ url_for('main.index') }}" class="back-link">
            <i class="fas fa-angle-left"></i> Return to Main Site
        </a>
    </div>

    <script>
        function togglePass() {
            const pwd = document.getElementById('user-pwd');
            const icon = event.currentTarget;
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
