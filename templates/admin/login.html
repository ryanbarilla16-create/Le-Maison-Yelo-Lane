<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login | Le Maison</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
</head>

<body class="admin-body" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div style="width: 100%; max-width: 420px; padding: 1rem;">
        <div
            style="background: #ffffff; border: 1px solid rgba(139,69,19,0.12); border-radius: 20px; padding: 2.5rem; text-align: center; box-shadow: 0 8px 30px rgba(139,69,19,0.08);">
            <i class="fas fa-coffee fa-3x mb-3" style="color: var(--admin-accent);"></i>
            <h2
                style="font-family: 'Georgia', serif; font-weight: bold; margin-bottom: 0.4rem; color: var(--admin-text);">
                Le Maison Admin</h2>
            <p style="color: var(--admin-text-muted); margin-bottom: 1.75rem; font-size: 0.9rem;">Sign in to the Super
                Admin Dashboard</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div
                style="background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; border-radius: 8px; font-size: 0.83rem; margin-bottom: 1.25rem; padding: 0.65rem 0.85rem;">
                {{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin.admin_login') }}">
                <div style="text-align: left; margin-bottom: 1.15rem;">
                    <label
                        style="color: var(--admin-text-muted); font-size: 0.78rem; font-weight: 600; margin-bottom: 0.35rem; display: block;">EMAIL</label>
                    <input type="email" name="email" required placeholder="admin@gmail.com"
                        style="width: 100%; padding: 0.7rem 0.85rem; border-radius: 8px; border: 1px solid rgba(139,69,19,0.15); background: #faf6f1; color: var(--admin-text); font-size: 0.9rem; outline: none;"
                        onfocus="this.style.borderColor='var(--admin-accent)'"
                        onblur="this.style.borderColor='rgba(139,69,19,0.15)'">
                </div>
                <div style="text-align: left; margin-bottom: 1.75rem; position: relative;">
                    <label
                        style="color: var(--admin-text-muted); font-size: 0.78rem; font-weight: 600; margin-bottom: 0.35rem; display: block;">PASSWORD</label>
                    <input type="password" id="admin-password" name="password" required placeholder="••••••••"
                        style="width: 100%; padding: 0.7rem 2.5rem 0.7rem 0.85rem; border-radius: 8px; border: 1px solid rgba(139,69,19,0.15); background: #faf6f1; color: var(--admin-text); font-size: 0.9rem; outline: none;"
                        onfocus="this.style.borderColor='var(--admin-accent)'"
                        onblur="this.style.borderColor='rgba(139,69,19,0.15)'">
                    <i class="fas fa-eye" onclick="toggleAdminPassword()"
                        style="position: absolute; right: 15px; top: 40px; cursor: pointer; color: #a0a0a0; font-size: 1.1rem; z-index: 10;"></i>
                </div>
                <button type="submit" class="btn-admin btn-admin-primary"
                    style="width: 100%; padding: 0.75rem; font-size: 0.95rem; border-radius: 10px;">
                    <i class="fas fa-lock me-2"></i> Sign In
                </button>
            </form>
            <p style="margin-top: 1.75rem; color: var(--admin-text-muted); font-size: 0.78rem;">
                <a href="{{ url_for('main.index') }}" style="color: var(--admin-accent); text-decoration: none;">← Back
                    to website</a>
            </p>
        </div>
    </div>
    <script>
        function toggleAdminPassword() {
            const pwd = document.getElementById('admin-password');
            const icon = event.currentTarget;
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
