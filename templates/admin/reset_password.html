<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Le Maison Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #8b634b; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; margin: 0; }
        .auth-bg { background: url('https://i.postimg.cc/PqLbFYhr/9.webp') no-repeat center center/cover; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; filter: blur(8px); transform: scale(1.1); }
        .auth-bg::after { content: ''; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.4); }
        .admin-navbar { background: rgba(93, 64, 55, 0.98); padding: 1.2rem 2rem; color: #fff; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); z-index: 100; }
        .navBrand { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .form-wrapper { max-width: 450px; margin: auto; padding: 3rem 2.5rem; background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .stepper { display: flex; justify-content: space-between; margin-bottom: 3rem; position: relative; }
        .stepper::before { content: ''; position: absolute; top: 20px; left: 0; right: 0; height: 2px; background: #eee; z-index: 1; }
        .step { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .step-icon { width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 2px solid #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #999; margin-bottom: 8px; }
        .step.active .step-icon, .step.completed .step-icon { background: var(--primary-color); border-color: var(--primary-color); color: #fff; }
        .step-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #999; }
        .step.active .step-label { color: var(--primary-color); }
        
        .form-control { padding: 1rem; border-radius: 12px; border: 1.5px solid #eee; font-size: 1rem; }
        .input-group-text { background: #fff; border: 1.5px solid #eee; border-radius: 12px; }
        .btn-primary-custom { background: #8B634B; border: none; padding: 1.2rem; border-radius: 50px; color: #fff; font-weight: 700; width: 100%; transition: 0.3s; margin-top: 1rem; }
        .btn-primary-custom:hover { background: #5D4037; transform: translateY(-2px); color: #fff; }
        .back-login { display: block; text-align: center; margin-top: 2rem; color: var(--primary-color); font-weight: 700; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-bg"></div>
    <nav class="admin-navbar"><a class="navBrand" href="#"><i class="fas fa-coffee"></i><span>Le Maison Yelo Lane</span></a></nav>
    <div class="container d-flex flex-grow-1">
        <div class="form-wrapper">
            <div class="stepper">
                <div class="step completed"><div class="step-icon"><i class="fas fa-check"></i></div><div class="step-label">Email</div></div>
                <div class="step completed"><div class="step-icon"><i class="fas fa-check"></i></div><div class="step-label">OTP</div></div>
                <div class="step active"><div class="step-icon">3</div><div class="step-label">New Pass</div></div>
            </div>
            <div class="text-center mb-4">
                <div style="background: rgba(139, 99, 75, 0.08); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i class="fas fa-key fa-2x" style="color: #8B634B;"></i>
                </div>
                <h2 style="font-family: 'Playfair Display', serif; font-weight: 800; color: #5D4037; font-size: 2rem;">Set New Password</h2>
                <p style="color: #6c757d; font-size: 0.95rem;">Please enter and confirm your new password below.</p>
            </div>
            <form method="POST" action="{{ url_for('admin.admin_reset_password') }}">
                <div class="form-group mb-4">
                    <label class="fw-bold mb-2 small text-muted">New Password *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="new_password" name="new_password" required placeholder="Min 6 characters" class="form-control" style="border-left:none;">
                    </div>
                </div>
                <div class="form-group mb-4">
                    <label class="fw-bold mb-2 small text-muted">Confirm New Password *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder="Retype password" class="form-control" style="border-left:none;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-custom">Set New Password</button>
            </form>
            <a href="{{ url_for('admin.admin_login') }}" class="back-login">Cancel and Return to Login</a>
        </div>
    </div>
</body>
</html>
