<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory Login | Le Maison</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"></noscript>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1976d2; /* Deep Blue */
            --primary-light: #42a5f5;
            --dark: #0d47a1;
            --bg-color: #e3f2fd;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Instant CSS Background rendering */
            background: linear-gradient(135deg, var(--bg-color) 0%, #bbdefb 100%);
            position: relative;
            z-index: 1;
        }

        /* Ambient geometric shapes */
        body::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(#64b5f6, transparent);
            opacity: 0.3;
            z-index: -1;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(#90caf9, transparent);
            opacity: 0.4;
            z-index: -1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(13, 71, 161, 0.1);
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 440px;
            text-align: center;
            border-bottom: 5px solid var(--primary);
        }

        .icon-container {
            width: 75px;
            height: 75px;
            background: #e3f2fd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--primary);
            font-size: 2rem;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
        }

        .login-title {
            color: var(--dark);
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 0.2rem 0;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            color: #546e7a;
            font-size: 0.95rem;
            font-weight: 500;
            margin: 0 0 2.5rem 0;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #455a64;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: #f8fbff;
            border: 1px solid #bbdefb;
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            font-size: 1rem;
            color: var(--dark);
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(33, 150, 243, 0.15);
        }

        .form-control::placeholder {
            color: #90caf9;
        }

        .pwd-control { padding-right: 3rem; }

        .toggle-pwd {
            position: absolute;
            right: 1.2rem;
            top: 40px;
            cursor: pointer;
            color: #64b5f6;
            transition: color 0.2s;
        }

        .toggle-pwd:hover { color: var(--primary); }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1.2rem;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--dark);
            box-shadow: 0 8px 20px rgba(13, 71, 161, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            text-decoration: none;
            color: #546e7a;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--dark); }

        .flash-msg {
            background: #ffebee;
            color: #c62828;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-container">
            <i class="fas fa-boxes-stacked"></i>
        </div>
        <h2 class="login-title">Inventory Master</h2>
        <p class="login-subtitle">Secured stock management access</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-msg">
            <i class="fas fa-exclamation-triangle" style="margin-right: 6px;"></i> {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('inventory_portal.inventory_login') }}">
            <div class="input-wrapper">
                <label class="input-label">Staff Email</label>
                <input type="email" name="email" required placeholder="inventory@le-maison.com" class="form-control">
            </div>
            
            <div class="input-wrapper">
                <label class="input-label">Password</label>
                <input type="password" id="user-pwd" name="password" required placeholder="••••••••" class="form-control pwd-control">
                <i class="fas fa-eye toggle-pwd" onclick="togglePass()"></i>
            </div>
            
            <button type="submit" class="btn-submit">
                <i class="fas fa-warehouse"></i> Access Vault
            </button>
        </form>

        <a href="{{ url_for('main.index') }}" class="back-link">
            <i class="fas fa-angle-left"></i> Return to Main Site
        </a>
    </div>

    <script>
        function togglePass() {
            const pwd = document.getElementById('user-pwd');
            const icon = event.currentTarget;
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
