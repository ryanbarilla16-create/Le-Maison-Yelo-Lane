<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Login - Le Maison</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --bg: #e8f5e9; --glass: rgba(255, 255, 255, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .bg-shapes { position: absolute; width: 100%; height: 100%; z-index: -1; }
        .shape1 { position: absolute; width: 400px; height: 400px; background: #c8e6c9; border-radius: 50%; top: -100px; left: -100px; filter: blur(50px); animation: float 6s ease-in-out infinite; }
        .shape2 { position: absolute; width: 300px; height: 300px; background: #a5d6a7; border-radius: 50%; bottom: -50px; right: -50px; filter: blur(50px); animation: float 8s ease-in-out infinite reverse; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .login-box { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transform: translateY(50px); opacity: 0; animation: slideUp 0.6s forwards; }
        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
        h1 { color: var(--primary); margin-bottom: 30px; font-weight: 600; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 10px; background: rgba(255, 255, 255, 0.5); font-size: 16px; outline: none; transition: all 0.3s ease; }
        input:focus { background: white; border-color: var(--primary); box-shadow: 0 0 10px rgba(46, 125, 50, 0.1); }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s ease; font-weight: 600; }
        button:hover { background: #1b5e20; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 125, 50, 0.2); }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape1"></div>
        <div class="shape2"></div>
    </div>
    <div class="login-box">
        <h1>Inventory Login</h1>
        <form action="/admin/login" method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
