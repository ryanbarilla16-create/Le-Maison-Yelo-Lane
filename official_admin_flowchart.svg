<svg width="1200" height="1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="1500" fill="#fcfaf9" />
  
  <style>
    .title { font-family: 'Inter', sans-serif; font-size: 32px; font-weight: 800; fill: #3e2723; text-anchor: middle; }
    .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: #795548; text-anchor: middle; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
    .box { fill: white; stroke: #4e342e; stroke-width: 2; rx: 12; ry: 12; filter: url(#shadow); }
    .box-hub { fill: #4e342e; stroke: #3e2723; stroke-width: 2; rx: 15; ry: 15; filter: url(#shadow); }
    .box-decision { fill: #fff; stroke: #795548; stroke-width: 2; }
    .box-module { fill: #d7ccc8; stroke: #5d4037; stroke-width: 2; rx: 8; ry: 8; }
    .box-action { fill: #efebe9; stroke: #795548; stroke-width: 1.5; rx: 5; ry: 5; }
    .text { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; fill: #3e2723; text-anchor: middle; dominant-baseline: middle; }
    .text-light { fill: white; font-weight: 800; font-size: 15px; }
    .arrow { stroke: #4e342e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .label { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 800; fill: #795548; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4e342e" />
    </marker>
  </defs>

  <text x="600" y="60" class="title">ADMIN SYSTEM FULL FLOWCHART</text>
  <text x="600" y="90" class="subtitle">Le Maison Kitchen | Professional Management Logic</text>
  <line x1="400" y1="110" x2="800" y2="110" stroke="#d7ccc8" stroke-width="4" stroke-linecap="round" />

  <!-- === LOGIN & AUTH === -->
  <rect x="500" y="140" width="200" height="50" class="box" />
  <text x="600" y="165" class="text">START: ADMIN LOGIN</text>

  <path d="M 600 190 L 600 230" class="arrow" />
  
  <rect x="500" y="235" width="200" height="70" class="box-decision" rx="10" ry="10" />
  <text x="600" y="270" class="text">Credential Check?</text>
  
  <!-- Recovery path -->
  <path d="M 700 270 L 800 270 L 800 165 L 700 165" class="arrow" />
  <text x="750" y="260" class="label">FORGOT PWD / OTP</text>

  <path d="M 600 305 L 600 345" class="arrow" />

  <!-- === CENTRAL HUB === -->
  <rect x="400" y="350" width="400" height="80" class="box-hub" />
  <text x="600" y="390" class="text text-light">ADMIN DASHBOARD (HUB)</text>

  <!-- === MAIN BRANCHES === -->

  <!-- Branch 1: Sales & Orders (Left) -->
  <path d="M 400 390 L 200 390 L 200 450" class="arrow" />
  <text x="180" y="440" class="label">ORDERS & POS</text>
  
  <rect x="100" y="460" width="200" height="40" class="box-module" />
  <text x="200" y="480" class="text">Orders Mgmt (Online / POS)</text>
  
  <path d="M 200 500 L 200 540" class="arrow" />
  <rect x="100" y="545" width="200" height="40" class="box-action" />
  <text x="200" y="565" class="text">Calculate & Payment</text>

  <path d="M 200 585 L 200 625" class="arrow" />
  <rect x="100" y="630" width="200" height="40" class="box-action" />
  <text x="200" y="650" class="text">Update Inventory Stocks</text>

  <!-- Branch 2: Kitchen (Center-Left) -->
  <path d="M 450 430 L 450 470" class="arrow" />
  <text x="430" y="460" class="label">KITCHEN KDS</text>
  
  <rect x="350" y="480" width="200" height="40" class="box-module" />
  <text x="450" y="500" class="text">Kitchen Queue Monitor</text>
  
  <path d="M 450 520 L 450 560" class="arrow" />
  <rect x="350" y="565" width="200" height="40" class="box-action" />
  <text x="450" y="585" class="text">Mark Ready & Notify</text>

  <!-- Branch 3: Reservations (Center-Right) -->
  <path d="M 750 430 L 750 470" class="arrow" />
  <text x="770" y="460" class="label">RESERVATIONS</text>
  
  <rect x="650" y="480" width="200" height="40" class="box-module" />
  <text x="750" y="500" class="text">Table & Date Mgmt</text>
  
  <path d="M 750 520 L 750 560" class="arrow" />
  <rect x="650" y="565" width="200" height="40" class="box-action" />
  <text x="750" y="585" class="text">Approve / Decline / Move</text>

  <!-- Branch 4: Logistics (Right) -->
  <path d="M 800 390 L 1000 390 L 1000 450" class="arrow" />
  <text x="1020" y="440" class="label">DELIVERIES</text>
  
  <rect x="900" y="460" width="200" height="40" class="box-module" />
  <text x="1000" y="480" class="text">Rider Tracking / Assign</text>
  
  <path d="M 1000 500 L 1000 540" class="arrow" />
  <rect x="900" y="545" width="200" height="40" class="box-action" />
  <text x="1000" y="565" class="text">Monitor GPS Progress</text>

  <!-- === MANAGEMENT SECTION === -->
  
  <path d="M 600 430 L 600 700" class="arrow" />
  <text x="630" y="680" class="label">MAINTENANCE</text>
  
  <!-- Inventory -->
  <rect x="150" y="750" width="180" height="40" class="box-module" />
  <text x="240" y="770" class="text">Inventory Tracking</text>
  <path d="M 240 790 L 240 830" class="arrow" />
  <rect x="150" y="835" width="180" height="40" class="box-action" />
  <text x="240" y="855" class="text">Stock-in / Restock Alert</text>

  <!-- Menu -->
  <rect x="360" y="750" width="180" height="40" class="box-module" />
  <text x="450" y="770" class="text">Menu Management</text>
  <path d="M 450 790 L 450 830" class="arrow" />
  <rect x="360" y="835" width="180" height="40" class="box-action" />
  <text x="450" y="855" class="text">Add/Edit Food Items</text>

  <!-- Users -->
  <rect x="570" y="750" width="180" height="40" class="box-module" />
  <text x="660" y="770" class="text">User Approvals</text>
  <path d="M 660 790 L 660 830" class="arrow" />
  <rect x="570" y="835" width="180" height="40" class="box-action" />
  <text x="660" y="855" class="text">Manage Staff/Riders</text>

  <!-- Analytics -->
  <rect x="780" y="750" width="180" height="40" class="box-module" />
  <text x="870" y="770" class="text">Analytics & Reports</text>
  <path d="M 870 790 L 870 830" class="arrow" />
  <rect x="780" y="835" width="180" height="40" class="box-action" />
  <text x="870" y="855" class="text">View Sales Charts</text>

  <!-- Settings -->
  <rect x="450" y="920" width="300" height="40" class="box-module" />
  <text x="600" y="940" class="text">System & Global Settings</text>
  <path d="M 600 960 L 600 1000" class="arrow" />
  <rect x="450" y="1005" width="300" height="40" class="box-action" />
  <text x="600" y="1025" class="text">Update Shop Hours / Configs</text>

  <!-- === REVIEWS & FEEDBACK === -->
  <rect x="150" y="920" width="200" height="40" class="box-module" />
  <text x="250" y="940" class="text">Customer Reviews</text>
  
  <!-- Closing -->
  <line x1="100" y1="1100" x2="1100" y2="1100" stroke="#4e342e" stroke-width="2" />
  
  <rect x="500" y="1150" width="200" height="50" rx="25" ry="25" class="box" />
  <text x="600" y="1175" class="text">END OF PROCESS</text>

  <text x="600" y="1230" font-family="Arial" font-size="12" fill="gray" text-anchor="middle">Official Multi-Module Admin Architecture v3.0 | Structured Map</text>

</svg>
