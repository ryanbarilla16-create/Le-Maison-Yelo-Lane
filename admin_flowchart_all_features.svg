<svg width="1200" height="1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="1100" fill="white" />
  
  <style>
    .text { font-family: 'Inter', Arial, sans-serif; font-size: 13px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
    .title { font-family: 'Inter', Arial, sans-serif; font-size: 26px; font-weight: 800; text-anchor: middle; }
    .label { font-family: 'Inter', Arial, sans-serif; font-size: 11px; font-weight: 800; text-anchor: middle; }
    .arrow { stroke: black; stroke-width: 2; fill: none; }
    .head { fill: black; }
  </style>

  <text x="600" y="50" class="title">ADMINISTRATIVE WORKFLOW & SYSTEM LOGIC</text>
  <line x1="300" y1="70" x2="900" y2="70" stroke="black" stroke-width="4" />

  <!-- === AUTHENTICATION === -->
  <rect x="525" y="100" width="150" height="50" rx="25" ry="25" fill="none" stroke="black" stroke-width="2" />
  <text x="600" y="125" class="text">ADMIN START</text>

  <line x1="600" y1="150" x2="600" y2="180" class="arrow" />
  <polygon points="595,180 605,180 600,190" class="head" />

  <path d="M 600 200 L 680 250 L 600 300 L 520 250 Z" fill="none" stroke="black" stroke-width="2" />
  <text x="600" y="250" class="text">Valid Login?</text>

  <line x1="600" y1="300" x2="600" y2="340" class="arrow" />
  <polygon points="595,340 605,340 600,350" class="head" />

  <rect x="450" y="350" width="300" height="60" fill="black" />
  <text x="600" y="380" class="text" fill="white">ADMIN DASHBOARD HUB</text>

  <!-- === THREE MAIN FLOW PATHS === -->
  
  <!-- 1. SALES/DAILY CYCLE FLOW (LEFT) -->
  <line x1="450" y1="380" x2="200" y2="380" class="arrow" />
  <line x1="200" y1="380" x2="200" y2="440" class="arrow" />
  <polygon points="195,440 205,440 200,450" class="head" />
  <text x="200" y="430" class="label">DAILY OPERATIONS</text>

  <rect x="125" y="450" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="200" y="470" class="text">Receive Online Order</text>

  <line x1="200" y1="490" x2="200" y2="520" class="arrow" />
  <polygon points="195,520 205,520 200,530" class="head" />

  <rect x="125" y="530" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="200" y="550" class="text">Send to Kitchen KDS</text>

  <line x1="200" y1="570" x2="200" y2="600" class="arrow" />
  <polygon points="195,600 205,600 200,610" class="head" />

  <rect x="125" y="610" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="200" y="630" class="text">Wait for Preparation</text>

  <line x1="200" y1="650" x2="200" y2="680" class="arrow" />
  <polygon points="195,680 205,680 200,690" class="head" />

  <path d="M 135 700 L 285 700 L 265 740 L 115 740 Z" fill="none" stroke="black" stroke-width="2" />
  <text x="200" y="720" class="text">Final Bill & Receipt</text>

  <!-- 2. INVENTORY CYCLE FLOW (CENTER) -->
  <line x1="600" y1="410" x2="600" y2="440" class="arrow" />
  <polygon points="595,440 605,440 600,450" class="head" />
  <text x="600" y="430" class="label">INVENTORY MGMT</text>

  <rect x="525" y="450" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="600" y="470" class="text">Check Stock Levels</text>

  <line x1="600" y1="490" x2="600" y2="520" class="arrow" />
  <polygon points="595,520 605,520 600,530" class="head" />

  <path d="M 600 530 L 680 570 L 600 610 L 520 570 Z" fill="none" stroke="black" stroke-width="2" />
  <text x="600" y="570" class="text">Stock Low?</text>

  <!-- Branch from Decision -->
  <line x1="680" y1="570" x2="720" y2="570" class="arrow" />
  <line x1="720" y1="570" x2="720" y2="610" class="arrow" />
  <polygon points="715,610 725,610 720,620" class="head" />
  <text x="735" y="590" class="text">YES</text>

  <rect x="645" y="620" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="720" y="640" class="text">Stock Request</text>

  <line x1="645" y1="640" x2="600" y2="640" class="arrow" />
  <line x1="600" y1="610" x2="600" y2="690" class="arrow" />
  <polygon points="595,690 605,690 600,700" class="head" />
  <text x="580" y="630" class="text">NO</text>

  <rect x="525" y="700" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="600" y="720" class="text">Update Audit Logs</text>

  <!-- 3. CUSTOMER/BOOKING FLOW (RIGHT) -->
  <line x1="750" y1="380" x2="1000" y2="380" class="arrow" />
  <line x1="1000" y1="380" x2="1000" y2="440" class="arrow" />
  <polygon points="995,440 1005,440 1000,450" class="head" />
  <text x="1000" y="430" class="label">CUSTOMER EVENTS</text>

  <rect x="925" y="450" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="1000" y="470" class="text">New Table Request</text>

  <line x1="1000" y1="490" x2="1000" y2="520" class="arrow" />
  <polygon points="995,520 1005,520 1000,530" class="head" />

  <path d="M 1000 530 L 1080 570 L 1000 610 L 920 570 Z" fill="none" stroke="black" stroke-width="2" />
  <text x="1000" y="570" class="text">Approve?</text>

  <line x1="1000" y1="610" x2="1000" y2="680" class="arrow" />
  <polygon points="995,680 1005,680 1000,690" class="head" />

  <rect x="925" y="690" width="150" height="60" fill="none" stroke="black" stroke-width="2" />
  <text x="1000" y="710" class="text">Notify Customer</text>
  <text x="1000" y="730" class="text">& Update Vouchers</text>

  <!-- === FINAL CONVERGENCE === -->
  <line x1="200" y1="740" x2="200" y2="840" class="arrow" />
  <line x1="600" y1="740" x2="600" y2="840" class="arrow" />
  <line x1="1000" y1="750" x2="1000" y2="840" class="arrow" />
  <line x1="200" y1="840" x2="1000" y2="840" class="arrow" />
  
  <line x1="600" y1="840" x2="600" y2="880" class="arrow" />
  <polygon points="595,880 605,880 600,890" class="head" />

  <rect x="525" y="890" width="150" height="40" fill="none" stroke="black" stroke-width="2" />
  <text x="600" y="910" class="text">System Audit Entry</text>

  <line x1="600" y1="930" x2="600" y2="970" class="arrow" />
  <polygon points="595,970 605,970 600,980" class="head" />

  <rect x="525" y="980" width="150" height="50" rx="25" ry="25" fill="none" stroke="black" stroke-width="2" />
  <text x="600" y="1005" class="text">END</text>

  <text x="600" y="1060" font-family="Arial" font-size="12" fill="gray" text-anchor="middle">Flowchart Logic v3.0 | Hierarchical & Functional Mapping</text>

</svg>
